# Benchmark-Konfiguration für Lightroom Ollama Keyword Generator
# Nur für den Benchmark-Modus — catalog_path wird nicht verwendet.

catalog_path: "unused"
model_name: "llava:7b"

ollama_endpoint: "http://localhost:11434"

prompt_template: >
  Du bist ein professioneller Foto-Analyst mit Expertise in Objekterkennung und
  computergestützter Bildbeschreibung. Du versuchst auch, berühmte Gebäude zu
  identifizieren. Darüber hinaus bestimmst du Tier- und Pflanzenarten so genau
  wie möglich. Du beschreibst Objekte so spezifisch wie du kannst.
  Analysiere dieses Foto und liefere beschreibende deutsche Stichwörter für die
  Foto-Katalogisierung. Antworte NUR mit einer kommaseparierten Liste von
  deutschen Stichwörtern. Keine Erklärungen.

benchmark_models:
  - "gemma4:e4b"
#  - "qwen3.5:4b"


benchmark_output_csv: "./benchmark_results/benchmark_results.csv"

log_file_path: "./benchmark.log"
tracking_db_path: "./tracking.db"

# Standort-Funktionalität — GPS-Koordinaten aus EXIF/Katalog lesen,
# per Reverse-Geocoding in Ortsnamen auflösen und als Stichwörter hinzufügen.
# Benötigt: pip install reverse_geocoder
location:
  enabled: true

# Klassifikation und Routing — Zwei-Stufen-Prozess
# Wenn dieser Abschnitt vorhanden ist, wird jedes Foto zuerst klassifiziert
# und dann mit einem spezialisierten Prompt analysiert.
# Ohne diesen Abschnitt wird der bisherige Einzelprompt-Modus verwendet.

# Klassifikation und Routing
classification:
  model: "gemma4:e4b"
  prompt: >
    Classify this photo into exactly ONE of these categories.
    Reply with ONLY the category name, nothing else. No explanation.
    Categories: Landscape, Portrait, Architecture, Document, Food, Animals, Garden, Museum, Event, Other
  categories:
    Landschaft:
      prompt: >
        Du bist ein professioneller Foto-Analyst mit Expertise in Objekterkennung 
        und computergestützter Bildbeschreibung. Analysiere dieses Foto und
        liefere beschreibende deutsche Stichwörter für die Foto-Katalogisierung. 
        Du beschreibst Objekte so spezifisch wie du kannst.
        Antworte NUR mit einer kommaseparierten Liste. Keine Erklärungen.
    Porträt:
      prompt: >
        Du bist ein professioneller Foto-Analyst mit Expertise in Objekterkennung 
        und computergestützter Bildbeschreibung. Analysiere dieses Foto und
        liefere beschreibende deutsche Stichwörter für die Foto-Katalogisierung. 
        Du beschreibst Objekte so spezifisch wie du kannst.
        Antworte NUR mit einer kommaseparierten Liste. Keine Erklärungen.
    Architektur:
      prompt: >
        Du bist ein professioneller Foto-Analyst mit Expertise in Objekterkennung 
        und computergestützter Bildbeschreibung. Analysiere dieses Foto und
        liefere beschreibende deutsche Stichwörter für die Foto-Katalogisierung. 
        Du beschreibst Objekte so spezifisch wie du kannst.
        Fokussiere besonders auf: Gebäudetyp, Architekturstil, berühmte
        Wahrzeichen, Material, Personen.
        Antworte NUR mit einer kommaseparierten Liste. Keine Erklärungen.
    Dokument:
