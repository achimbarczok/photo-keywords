# Benchmark-Konfiguration für Lightroom Ollama Keyword Generator
# Nur für den Benchmark-Modus — catalog_path wird nicht verwendet.

catalog_path: "unused"
model_name: "gemma4:e4b"
ollama_endpoint: "http://localhost:11434"

prompt_template: >
  Du bist ein professioneller Foto-Analyst. Analysiere dieses Foto und liefere
  beschreibende deutsche Stichwörter für die Foto-Katalogisierung.
  Antworte NUR mit einer kommaseparierten Liste. Keine Erklärungen.

benchmark_models:
  - "gemma4:e4b"

benchmark_output_csv: "./benchmark_results/benchmark_results.csv"
log_file_path: "./benchmark.log"
tracking_db_path: "./tracking.db"

location:
  enabled: true

classification:
  model: "gemma4:e4b"
  prompt: >
    Classify this photo into exactly ONE of these categories.
    Reply with ONLY the category name, nothing else. No explanation.
    Categories: Landscape, Portrait, Urban, Interior, Document, Food, Animals, Garden, Museum, Event, Other

  # Basis-Prompt: wird allen Kategorie-Prompts vorangestellt
  base_prompt: >
    Du bist ein professioneller Foto-Analyst mit Expertise in Objekterkennung
    und computergestützter Bildbeschreibung. Analysiere dieses Foto und liefere
    beschreibende deutsche Stichwörter für die Foto-Katalogisierung.
    Du beschreibst Orte, Objekte und Situationen so spezifisch wie du kannst.
    Antworte NUR mit einer kommaseparierten Liste. Keine Erklärungen.

  categories:
    Landschaft:
      prompt: >
        Fokussiere besonders auf: Wetter, Tageszeit, Lichtstimmung, Vegetation,
        Gelände, Jahreszeit, Horizont, Personen, Situationen.
    Porträt:
      prompt: >
        Fokussiere besonders auf: Bildkomposition, Personen, Anzahl,
        Gesichtsausdrücke, Kleidung, Pose, Hintergrund, Beleuchtung.
    Stadt:
      prompt: >
        Fokussiere besonders auf: Gebäudetyp, Architekturstil, berühmte
        Wahrzeichen, Straßenszene, Skyline, urbanes Leben, Verkehr.
    Innenraum:
      prompt: >
        Fokussiere besonders auf: Raumtyp, Einrichtung, Möbel, Beleuchtung,
        Atmosphäre, Dekoration, Personen, Nutzung des Raums.
    Dokument:
      prompt: >
        Fokussiere besonders auf: Dokumenttyp, Textinhalte, Sprache, Format,
        Zustand, historischer Kontext.
    Essen:
      prompt: >
        Fokussiere besonders auf: Gericht, Zutaten, Küche, Präsentation,
        Anlass, Getränke, Umgebung.
    Tiere:
      prompt: >
        Fokussiere besonders auf: Tierart, Lebensraum, Verhalten, Anzahl,
        Umgebung. Auch Fossilien und Tierpräparate zählen dazu.
    Garten:
      prompt: >
        Fokussiere besonders auf: Pflanzenarten, Blüten, Gartengestaltung,
        Jahreszeit, Gartenelemente, Farben.
    Museum:
      prompt: >
        Fokussiere besonders auf: Ausstellungsstück, Epoche, Material,
        Exponat, Fossilien, Kunstwerk, historischer Kontext.
    Veranstaltung:
      prompt: >
        Fokussiere besonders auf: Art der Veranstaltung, Anlass, Personen,
        Dekoration, Ort, Bühne, Publikum.
    Sonstiges:
      prompt: >
        Beschreibe alles was du siehst: Objekte, Materialien, Farben,
        Zustand, Kontext, Verwendungszweck.
